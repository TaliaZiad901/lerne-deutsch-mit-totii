<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alphabet Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#9C27B0,#E91E63);
text-align:center;
color:white;
}

#startScreen{
padding:30px;
}

h1{
font-size:40px;
}

h2{
margin-top:30px;
}

.character{
display:inline-block;
background:white;
color:black;
width:150px;
padding:15px;
margin:15px;
border-radius:20px;
cursor:pointer;
transition:.3s;
}

.character:hover{
transform:scale(1.08);
background:#ffe082;
}

.character img{
width:100px;
height:100px;
border-radius:50%;
}

button{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:15px;
background:#FFD54F;
cursor:pointer;
margin-top:30px;
font-weight:bold;
}

button:hover{
background:orange;
}

</style>

</head>

<body>

<div id="startScreen">

<h1>🎮 Alphabet Game 🇩🇪</h1>

<h2>Choose Your Character</h2>

<div class="character" onclick="choose('girl')">
<img src="https://api.dicebear.com/9.x/adventurer/svg?seed=Anna">
<h3>👧 Anna</h3>
</div>

<div class="character" onclick="choose('boy')">
<img src="https://api.dicebear.com/9.x/adventurer/svg?seed=Max">
<h3>👦 Max</h3>
</div>

<br>

<p id="selected">No Character Selected</p>

<button onclick="startGame()">▶ Start Game</button>

</div>

<script>
let player="";

let score=100;
let current=0;
const questions = [

{
question:'🍎 Wie heißt "apple" auf Deutsch?',
options:["Hund","Blume","Apfel","Zebra"],
correct:2
},

{
question:'👦 Wie heißt "boy" auf Deutsch?',
options:["Katze","Junge","Hund","Vogel"],
correct:1
},

{
question:'🐶 Wie heißt "dog" auf Deutsch?',
options:["Löwe","Hund","Katze","Zebra"],
correct:1
},

{
question:'🌸 Wie heißt "flower" auf Deutsch?',
options:["Blume","Lampe","Orange","Maus"],
correct:0
},

{
question:'🐱 Wie heißt "cat" auf Deutsch?',
options:["Hund","Katze","Frosch","Zebra"],
correct:1
},

{
question:'🐸 Wie heißt "frog" auf Deutsch?',
options:["Frosch","Hund","Vogel","Blume"],
correct:0
},

{
question:'🦒 Wie heißt "giraffe" auf Deutsch?',
options:["Elefant","Giraffe","Zebra","Löwe"],
correct:1
},

{
question:'🕒 Wie heißt "clock" auf Deutsch?',
options:["Tafel","Uhr","Lampe","Ring"],
correct:1
},

{
question:'☀️ Wie heißt "sun" auf Deutsch?',
options:["Mond","Sonne","Wasser","Orange"],
correct:1
},

{
question:'🚂 Wie heißt "train" auf Deutsch?',
options:["Taxi","Zug","Auto","Bus"],
correct:1
},

{
question:'🐭 Wie heißt "mouse" auf Deutsch?',
options:["Katze","Hund","Maus","Löwe"],
correct:2
},

{
question:'🌙 Wie heißt "moon" auf Deutsch?',
options:["Mond","Sonne","Sofa","Ei"],
correct:0
},

{
question:'👃 Wie heißt "nose" auf Deutsch?',
options:["Nase","Hand","Kopf","Ring"],
correct:0
},

{
question:'🍊 Wie heißt "orange" auf Deutsch?',
options:["Orange","Apfel","Tomate","Ei"],
correct:0
},

{
question:'🦜 Wie heißt "parrot" auf Deutsch?',
options:["Papagei","Vogel","Hund","Katze"],
correct:0
},

{
question:'💍 Wie heißt "ring" auf Deutsch?',
options:["Ring","Rad","Uhr","Tafel"],
correct:0
},

{
question:'📚 Wie heißt "board" auf Deutsch?',
options:["Tafel","Lampe","Sofa","Blume"],
correct:0
},

{
question:'🐦 Wie heißt "bird" auf Deutsch?',
options:["Hund","Vogel","Katze","Fisch"],
correct:1
},

{
question:'🦓 Wie heißt "zebra" auf Deutsch?',
options:["Pferd","Zebra","Kuh","Hund"],
correct:1
},

{
question:'💧 Wie heißt "water" auf Deutsch?',
options:["Milch","Cola","Wasser","Saft"],
correct:2
}

];

function choose(name){
player=name;

document.getElementById("selected").innerHTML=
"✅ Character Selected";
}

function startGame(){

if(player==""){
alert("Choose your character first!");
return;
}

showQuestion();

}
function showQuestion(){

let q=questions[current];

document.getElementById("startScreen").innerHTML=`

<h1>🎮 Alphabet Game</h1>

<h2>⭐ Score: ${score}</h2>

<h2>📚 Question ${current+1} / ${questions.length}</h2>

<div style="background:white;color:black;padding:20px;border-radius:20px;width:85%;margin:auto;">

<h2>${q.question}</h2>

<button onclick="answer(0)">${q.options[0]}</button><br><br>

<button onclick="answer(1)">${q.options[1]}</button><br><br>

<button onclick="answer(2)">${q.options[2]}</button><br><br>

<button onclick="answer(3)">${q.options[3]}</button>

</div>

<p id="msg"></p>

`;

}
function answer(choice){

if(choice==questions[current].correct){

document.getElementById("msg").innerHTML="🎉 Correct!";

setTimeout(nextQuestion,1000);

}else{

score--;

document.getElementById("msg").innerHTML=
"❌ Wrong!<br>✅ الإجابة الصحيحة: "+questions[current].options[questions[current].correct];

setTimeout(nextQuestion,2000);

}

}
function nextQuestion(){

current++;

if(current < questions.length){

showQuestion();

}else{

finishGame();

}

}
function finishGame(){

document.getElementById("startScreen").innerHTML=`

<h1>🏆 Game Finished</h1>

<h2>Your Score</h2>

<h1>${score}/100</h1>

<p>${
score==100
?
"🥇 Perfect! You are amazing!"
:
score>=90
?
"🌟 Excellent!"
:
score>=80
?
"👏 Very Good!"
:
"💪 Keep Practicing!"
}</p>

<button onclick="location.reload()">
🔄 Play Again
</button>

`;}



</script>

</body>
</html>
