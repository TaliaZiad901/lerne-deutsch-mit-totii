<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Countries Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#673AB7,#E91E63);
text-align:center;
color:white;
}

#game{
padding:30px;
}

h1{
font-size:40px;
}

.character{
display:inline-block;
background:white;
color:black;
width:150px;
padding:15px;
margin:15px;
border-radius:20px;
cursor:pointer;
transition:.3s;
}

.character:hover{
transform:scale(1.08);
background:#FFD54F;
}

.character img{
width:100px;
height:100px;
border-radius:50%;
}

button{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:15px;
background:#FFD54F;
cursor:pointer;
margin-top:20px;
font-weight:bold;
}

button:hover{
background:orange;
}

.card{
background:white;
color:black;
width:85%;
margin:auto;
padding:20px;
border-radius:20px;
}

</style>

</head>

<body>

<div id="game">

<h1>🎮 Countries Game 🇩🇪</h1>

<h2>Choose Your Character</h2>

<div class="character" onclick="choose('girl')">

<img src="https://api.dicebear.com/9.x/adventurer/svg?seed=Anna">

<h3>👧 Anna</h3>

</div>

<div class="character" onclick="choose('boy')">

<img src="https://api.dicebear.com/9.x/adventurer/svg?seed=Max">

<h3>👦 Max</h3>

</div>

<p id="selected">No Character Selected</p>

<button onclick="startGame()">
▶ Start Game
</button>

</div>

<script>

let player="";
let score=100;
let current=0;

const questions=[
  {
question:"🌍 Woher kommst du?",
options:[
"Ich komme aus Deutschland.",
"Guten Morgen.",
"Tschüss."
],
correct:0
},

{
question:"🇪🇸 Spanien = ?",
options:[
"Germany",
"France",
"Spain"
],
correct:2
},

{
question:"🇩🇪 Deutschland = ?",
options:[
"Germany",
"Spain",
"France"
],
correct:0
},

{
question:"🇫🇷 Frankreich = ?",
options:[
"France",
"Germany",
"Spain"
],
correct:0
},

{
question:"🇪🇬 Ägypten = ?",
options:[
"Egypt",
"Germany",
"France"
],
correct:0
},

{
question:"🇲🇦 Marokko = ?",
options:[
"Morocco",
"Spain",
"Germany"
],
correct:0
},

{
question:"🌍 Woher kommen Sie?",
options:[
"Ich komme aus Spanien.",
"Hallo.",
"Mir geht's gut."
],
correct:0
},

{
question:"📖 Ich komme aus Frankreich.",
options:[
"I come from France.",
"I live in France.",
"I like France."
],
correct:0
},

{
question:"📖 Ich komme aus Deutschland.",
options:[
"I come from Germany.",
"I come from Spain.",
"I come from France."
],
correct:0
},

{
question:"🌍 Woher kommst du?",
options:[
"Ich komme aus Marokko.",
"Gute Nacht.",
"Bis Morgen."
],
correct:0
},

{
question:"🇪🇸 Spain in German is...",
options:[
"Spanien",
"Deutschland",
"Frankreich"
],
correct:0
},

{
question:"🇩🇪 Germany in German is...",
options:[
"Deutschland",
"Spanien",
"Frankreich"
],
correct:0
},

{
question:"🇫🇷 France in German is...",
options:[
"Frankreich",
"Spanien",
"Ägypten"
],
correct:0
},

{
question:"🇪🇬 Egypt in German is...",
options:[
"Ägypten",
"Marokko",
"Deutschland"
],
correct:0
},

{
question:"🇲🇦 Morocco in German is...",
options:[
"Marokko",
"Spanien",
"Frankreich"
],
correct:0
}

];
  function choose(name){

player=name;

document.getElementById("selected").innerHTML=
"✅ Character Selected";

}

function startGame(){

if(player==""){
alert("Choose your character first!");
return;
}

showQuestion();

}

function showQuestion(){

let q=questions[current];

document.getElementById("game").innerHTML=`

<h1>🎮 Countries Game 🇩🇪</h1>

<h2>⭐ Score: ${score}</h2>

<h2>📚 Question ${current+1} / ${questions.length}</h2>

<div class="card">

<h2>${q.question}</h2>

<button onclick="answer(0)">${q.options[0]}</button><br><br>

<button onclick="answer(1)">${q.options[1]}</button><br><br>

<button onclick="answer(2)">${q.options[2]}</button>

</div>

<p id="msg"></p>

`;

}

function answer(choice){

if(choice==questions[current].correct){

document.getElementById("msg").innerHTML="🎉 Correct!";

setTimeout(nextQuestion,1000);

}else{

score-=5;

document.getElementById("msg").innerHTML=
"❌ Wrong!<br>✅ Correct Answer: "+
questions[current].options[questions[current].correct];

setTimeout(nextQuestion,2000);

}

}

function nextQuestion(){

current++;

if(current<questions.length){

showQuestion();

}else{

finishGame();

}

}

function finishGame(){

document.getElementById("game").innerHTML=`

<h1>🏆 Game Finished</h1>

<h2>Your Score</h2>

<h1>${score}/100</h1>

<p>${
score==100
?
"🥇 Perfect! You are amazing!"
:
score>=90
?
"🌟 Excellent!"
:
score>=80
?
"👏 Very Good!"
:
score>=70
?
"🙂 Good!"
:
"💪 Keep Practicing!"
}</p>

<button onclick="location.reload()">
🔄 Play Again
</button>

`;

}

</script>

</body>
</html>
